# ============================================================
#  Shared Control & Intent Inference parameters
# ============================================================

intent_inference:
  # --- Bayesian belief update ---
  transition_probability: 0.1
  direction_likelihood_parameter: 4.0
  proximity_likelihood_parameter: 3.0

  # --- thresholds ---
  confidence_threshold: 0.45  # confidence = (p_max - 1/N) / (1 - 1/N).

  z_distance_threshold: 0.15  # [m] max |dz| for `isNearTarget`/`isTargetReached`
  near_distance_threshold: 0.03  # [m] XY distance for `isNearTarget`
  position_tolerance: 0.005  # [m] XY distance for `isTargetReached`
  pick_area_distance_threshold: 0.40  # [m] 3D distance for `isInPickArea`
  grasp_removal_distance_threshold: 0.10  # [m] 3D distance to remove nearest object on grasp
  staging_pose_reached_angle: 0.05  # [rad] ~3° azimuth convergence to end return-assist
  
  user_command_speed_tolerance: 0.15  # [m/s] ignore commands below this speed
  
  toward_target_similarity: 0.5  # cos(60°) ≈ 0.5
  away_target_similarity: -0.707  # cos(135°) ≈ -0.707

  # --- Timers ---
  assist_dwell_time: 0.3  # [s] hold before PICK_MANUAL → PICK_ASSIST
  reject_cooldown_time: 1.0  # [s] cooldown after PICK_REJECT
  
arbitration:
  # --- Lateral suppression ---
  repulsive_force_weak_gain: 0.8      # gain at distance >= junction
  repulsive_force_strong_gain: 0.2    # gain at distance ~ 0
  repulsive_force_junction_distance: 0.3  # [m] knee of the interpolation

  # --- Position-level attraction ---
  attract_max_distance: 0.4  # [m] no attraction beyond this
  attract_gain_horizontal: 0.9  # [0,1] fraction of remaining XY error
  attract_gain_vertical: 0.2  # [0,1] fraction of remaining Z error

  # --- Return-assist waypoint navigation (cylindrical) ---
  return_assist_angular_rate: 0.9   # azimuth convergence (primary motion)
  return_assist_radial_rate: 0.8    # radius contraction (slower)
  return_assist_vertical_rate: 0.7  # height convergence
  return_assist_orientation_rate: 0.9  # slerp rate for gripper orientation
